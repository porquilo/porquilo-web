name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.14" ]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.5.20"

    - name: Install dependencies
      run: |
        cd server && uv sync --dev

    - name: Run tests
      run: |
        cd server && uv run pytest

  e2e:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.14
      uses: actions/setup-python@v5
      with:
        python-version: "3.14"

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.5.20"

    - name: Install Python dependencies
      run: uv sync --dev
      working-directory: server

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install Node dependencies
      run: npm ci
      working-directory: web-app

    - name: Install Playwright chromium
      run: npx playwright install chromium --with-deps
      working-directory: web-app

    - name: Run migrations
      run: uv run alembic upgrade head
      working-directory: server
      env:
        DATABASE_URL: sqlite:///./porquilo-e2e.db

    - name: Start API server
      run: uv run uvicorn porquilo.main:app --host 0.0.0.0 --port 8000 &
      working-directory: server
      env:
        DATABASE_URL: sqlite:///./porquilo-e2e.db

    - name: Wait for API server
      run: for i in {1..30}; do curl -sf http://localhost:8000/health && break || sleep 1; done

    - name: Run Playwright tests
      run: npx playwright test --project=chromium
      working-directory: web-app
      env:
        API_PROXY_TARGET: http://localhost:8000

    - name: Upload Playwright report
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: playwright-report
        path: web-app/playwright-report/