services:
  server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dev
    ports:
      - "4184:8000"
    volumes:
      - ../server:/app
      - porquilo-data:/data
    environment:
      - DB_ENGINE=sqlite
    command: uv run uvicorn porquilo.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/src

  web:
    image: node:24-slim
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ../web-app:/app
      - /app/node_modules
    environment:
      - API_PROXY_TARGET=http://server:8000
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  porquilo-data: